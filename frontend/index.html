<head><link rel="stylesheet" href="style.css">
<script src="app.js" defer></script></head>


<h1>upload image</h1>



<input type="file" id="photo" accept="image/*" capture="enviornment">

<p></p>


<button id="uploader-button">UPLOAD</button>

<img id="preview" style="display:none">



<p id="uploadstatus">...</p>



<h1> text extraction </h1>

<button id="ocr-button">GET TEXT</button>



<div id="ocr" style="display:none">
<br><br>
<textarea id="ocr-result" rows="10" placeholder="..."></textarea>

<p id="ocr-confidence">confidence: 67%</p>



</div>

<p id="ocr-status">waiting...</p>
